# Builda o convite e publica no GitHub Pages a cada push na main.
#
# Pré-requisito: o repositório precisa ser PÚBLICO (no plano gratuito o Pages
# não funciona em repositório privado — o erro aparece como "Get Pages site
# failed / Not Found" no passo configure-pages). Com GitHub Pro dá para manter
# privado. O Pages em si é habilitado sozinho pelo `enablement: true` abaixo.
name: Deploy no GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # permite rodar na mão pela aba Actions

permissions:
  contents: read
  pages: write
  id-token: write

# Se dois deploys forem disparados juntos, deixa o mais novo terminar.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # `enablement: true`: liga o Pages sozinho na 1ª execução, dispensando o
      # passo manual em Settings -> Pages. Só funciona se o repo for público
      # (ou a conta for Pro) — caso contrário falha com "Not Found".
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
